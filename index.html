<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과거로부터의 초대</title>
    <script src="https://code.jquery.com/jquery-latest.min.js"></script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        body {
            width: 100%;
            font-family: Arial, sans-serif;
            position: relative;
        }
        
        .snow_wrap { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }
        
        .snow { 
            width: 100%;
            height: 100%;
            background: #222834;
        } 
        
        .first-sentence, .second-sentence {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Courier New', Courier, monospace;
            font-size: 20px;
            text-align: center;
            color: white;
            z-index: 1;
            opacity: 0;
            animation: fadeInOut 5s forwards;
        }

        .second-sentence {
            animation-delay: 5s;
        }

        @keyframes fadeInOut {
            0% {
                opacity: 0;
            }
            20%, 80% {
                opacity: 1;
                filter: drop-shadow(0 0 10px #fff);
            }
            100% {
                opacity: 0;
            }
        }

        .cat-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            opacity: 0;
            animation: scaleUp 5s 10s forwards;
        }
            
        #cat {
            max-width: 250px;
            width: 100%;
            height: auto;
            filter: drop-shadow(0 0 10px transparent);
        }

        .cat-talk {
          position: fixed;
          bottom: 20px;
          left: 50%;
          transform: translateX(-50%);
          background: rgba(255, 255, 255, 0.9);
          padding: 15px 20px;
          border-radius: 15px;
          box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
          max-width: 90%;
          z-index: 5;
          font-family: 'Courier New', Courier, monospace;
        }
        
        #talk-lines {
          margin: 0;
          padding: 0;
          list-style-type: none;
        }
        
        #talk-lines li {
          display: none;
          font-size: 16px;
          line-height: 1.5;
          color: #333;
        }
        
        @keyframes scaleUp {
            0% {
                transform: scale(0.2);
                filter: drop-shadow(0 0 10px transparent);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 20px #ffd700);
                opacity: 1;
            }
        }

        .cat-talk {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 16px;
            display: none;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            animation: fadeIn 0.5s;
        }
        .hidden {
            display: none; /* hidden 클래스 스타일 정의 */
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
    </style>    
</head>
<body>
    <div class="snow_wrap">
        <canvas class="snow"></canvas>
    </div>

    <!-- 첫 번째 문장 -->
    <div class="first-sentence">
        <p>지금은 2024년, 추운겨울</p>
        <p>어디 재밌는 일 좀 뭐 없나</p>
    </div>

    <!-- 두 번째 문장 -->
    <div class="second-sentence">
        <p>저게 뭐지? 뭔가 다가오는데...</p>
        <p>고양이? 고양이가 오고 있는 건가....?</p>
    </div>
    
    <!-- 고양이 말풍선 -->
    <div class="cat-talk">
        <ul id="talk-lines">
        <!-- 타이핑될 문장들이 순차적으로 표시됩니다 -->
        </ul>
    </div>

    <!-- Modal Container -->
    <div id="modal" class="modal hidden">
      <div class="modal-content">
        <h1>※ (주) 오합지졸 ※</h1>
        <p>이 편지는 12년 전 과거로부터 온 행운의 편지입니다.</p>
        <button id="accept-button">수락하기</button>
        <button id="reject-button">거절하기</button>
      </div>
    </div>

<script>
    $(document).ready(function () {
        // 스크립트 초기화
        const canvas = $('.snow')[0];
        const context = canvas.getContext('2d');
        let canvasWidth = $('.snow_wrap').width();
        let canvasHeight = $('.snow_wrap').height();
        let lastDeviceType = window.innerWidth < 768 ? 'mobile' : 'desktop';

        function createParticles() {
            snowParticles = [];
            const particleCount = lastDeviceType === 'mobile' ? 40 : 100;
            for (let i = 0; i < particleCount; i++) {
                snowParticles.push(new createParticle());
            }
        }

        function setCanvasSize() {
            const currentDeviceType = window.innerWidth < 768 ? 'mobile' : 'desktop';
            if (currentDeviceType !== lastDeviceType) {
                lastDeviceType = currentDeviceType;
                createParticles();
            }

            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = canvasWidth;
            tempCanvas.height = canvasHeight;
            tempCtx.drawImage(canvas, 0, 0);

            canvasWidth = $('.snow_wrap').width();
            canvasHeight = $('.snow_wrap').height();
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;

            context.drawImage(tempCanvas, 0, 0);
        }

        let snowParticles = [];

        function createParticle() {
            this.x = Math.random() * canvasWidth;
            this.y = Math.random() * canvasHeight;
            this.vx = Math.random() * 4 - 1;
            this.vy = Math.random() * 4 + 1;
            this.color = `rgba(255, 255, 255, ${Math.random()})`;
            this.radius = Math.random() * 5 + 2;
        }

        function draw() {
            context.clearRect(0, 0, canvasWidth, canvasHeight);
            snowParticles.forEach(function (particle) {
                context.beginPath();
                let gradient = context.createRadialGradient(particle.x, particle.y, 0, particle.x, particle.y, particle.radius);
                gradient.addColorStop(1, particle.color);
                gradient.addColorStop(1, "rgb(66, 66, 66)");
                context.fillStyle = gradient;
                context.arc(particle.x, particle.y, particle.radius, Math.PI * 2, false);
                context.fill();
                particle.x += particle.vx;
                particle.y += particle.vy;
                if (particle.x < -50) particle.x = canvasWidth + 50;
                if (particle.y < -50) particle.y = canvasHeight + 50;
                if (particle.x > canvasWidth + 50) particle.x = -50;
                if (particle.y > canvasHeight + 50) particle.y = -50;
            });
        }

        $(window).resize(setCanvasSize);
        setCanvasSize();
        createParticles();
        setInterval(draw, 33);

        // 고양이 말풍선 타이핑 효과
        const lines = [
            "안녕하세요, 혹시 (주)오합지졸에서 발송한 행운의 편지를 받으러 오셨나요?",
            "마침, 과거로부터 편지가 오늘 도착했는데...",
            "편지를 받아보는 건 자유라 본인이 선택하시면 됩니다."
        ];
        let currentLine = 0;

        function typeLine(line, callback) {
            let charIndex = 0;
            const target = $('<li></li>');
            $('#talk-lines').append(target);

            function typeChar() {
                if (charIndex < line.length) {
                    target.append(line[charIndex]);
                    charIndex++;
                    setTimeout(typeChar, 50); // 타이핑 속도
                } else {
                    if (callback) {
                        setTimeout(callback, 1000); // 다음 문장 출력 전 대기 시간
                    }
                }
            }
            typeChar();
        }

        function displayNextLine() {
            if (currentLine < lines.length) {
                typeLine(lines[currentLine], displayNextLine);
                currentLine++;
            } else {
                // 모든 문장이 출력된 후 모달 창 열기
                setTimeout(() => {
                    $('#modal').removeClass('hidden');
                }, 1000);
            }
        }

        // 모달 숨기기 초기화
        $('#modal').addClass('hidden');

        // 고양이가 나타난 후 말풍선 타이핑 시작
        setTimeout(() => {
            $('.cat-talk').fadeIn(1000, displayNextLine);
        }, 15000);

        // 버튼 클릭 이벤트
        $('#accept-button').on('click', function () {
            window.open('past.html', '_blank');
        });
    });
</script>


</body>
</html>
