<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 과거로부터의 초대 </title>
    <script src="https://code.jquery.com/jquery-latest.min.js"></script>
    <script>
        // 타이핑 효과
        const text = "과거로부터 온 행운의 편지입니다. 과거 여행을 수락하시겠습니까?";
        let i = 0;
    
        function typeEffect() {
          if (i < text.length) {
            $('#typing').text(function(_, currentText) {
              return currentText + text.charAt(i);
            });
            i++;
            setTimeout(typeEffect, 100); // 타이핑 속도 조절
          }
        }
    
        // 고양이를 클릭하면 모달 열기
        $('#cat').on('click', function() {
          $('#modal').removeClass('hidden');
          typeEffect(); // 타이핑 효과 시작
        });
    
        // "수락하기" 버튼 클릭 시 새창으로 이동
        $('#accept-button').on('click', function() {
          window.open('past.html', '_blank');
        });
        
        $(document).ready(function(){
            const canvas = $('.snow')[0];
            const context = canvas.getContext('2d');
            
            let canvasWidth = $('.snow_wrap').width();
            let canvasHeight = $('.snow_wrap').height();
            let lastDeviceType = window.innerWidth < 768 ? 'mobile' : 'desktop';
            
            function createParticles() {
                snowParticles = []; 
                const particleCount = lastDeviceType === 'mobile' ? 40 : 100; 
                for (let i = 0; i < particleCount; i++) {
                    snowParticles.push(new createParticle());
                }
            }
            
            function setCanvasSize() {
                const currentDeviceType = window.innerWidth < 768 ? 'mobile' : 'desktop';
                if (currentDeviceType !== lastDeviceType) {
                    lastDeviceType = currentDeviceType;
                    createParticles();
                }
                
                const tempCanvas = document.createElement('canvas');
                const tempCtx = tempCanvas.getContext('2d');
                tempCanvas.width = canvasWidth;
                tempCanvas.height = canvasHeight;
                tempCtx.drawImage(canvas, 0, 0);
            
                canvasWidth = $('.snow_wrap').width();
                canvasHeight = $('.snow_wrap').height();
                canvas.width = canvasWidth;
                canvas.height = canvasHeight;
            
                context.drawImage(tempCanvas, 0, 0);
            }

            let snowParticles = []; 

            function createParticle() {
                this.x = Math.random() * canvasWidth;
                this.y = Math.random() * canvasHeight;
                this.vx = Math.random() * 4 - 1;
                this.vy = Math.random() * 4 + 1;
                this.color = `rgba(255, 255, 255, ${Math.random()})`;
                this.radius = Math.random() * 5 + 2;
            }

            function draw() {
                context.clearRect(0, 0, canvasWidth, canvasHeight);
                snowParticles.forEach(function(particle) {
                    context.beginPath();
                    let gradient = context.createRadialGradient(particle.x, particle.y, 0, particle.x, particle.y, particle.radius);
                    gradient.addColorStop(1, particle.color);
                    gradient.addColorStop(1, "rgb(66, 66, 66)");
                    context.fillStyle = gradient;
                    context.arc(particle.x, particle.y, particle.radius, Math.PI * 2, false);
                    context.fill();
                    particle.x += particle.vx;
                    particle.y += particle.vy;
                    if (particle.x < -50) particle.x = canvasWidth + 50;
                    if (particle.y < -50) particle.y = canvasHeight + 50;
                    if (particle.x > canvasWidth + 50) particle.x = -50;
                    if (particle.y > canvasHeight + 50) particle.y = -50;
                });
            }

            $(window).resize(setCanvasSize);
            setCanvasSize(); 
            createParticles(); 
            setInterval(draw, 33); 
        });
    </script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        body {
            width: 100%;
            font-family: Arial, sans-serif;
            position: relative;
        }
        
        .snow_wrap { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;  /* 배경 이미지를 맨 뒤로 설정 */
        }
        
        .snow { 
            width: 100%;
            height: 100%;
            background: #394449;
        } 
        
        .cat-container {
              position: absolute;
              top: 50%;
              left: 50%;
              transform: translate(-50%, -50%);
              display: flex;
              justify-content: center;
              align-items: center;
              z-index: 2;  /* 고양이가 배경 이미지 위에 보이도록 설정 */
        }
            
        #cat {
              max-width: 250px;
              width: 100%;
              height: auto;
              animation: scaleUp 5s ease-in-out forwards;
              filter: drop-shadow(0 0 10px transparent);
        }
        
        @keyframes scaleUp {
              0% {
                transform: scale(0.2);
                filter: drop-shadow(0 0 10px transparent);
              }
              100% {
                transform: scale(1);
                filter: drop-shadow(0 0 20px #ffd700); /* 후광 네온 효과 */
              }
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            }
            
            .modal-content {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            animation: fadeIn 0.5s;
        }
        
        .hidden {
            display: none;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

    #typing {
        font-family: 'Courier New', Courier, monospace;
        font-size: 18px;
        color: white;
        white-space: pre-wrap;
    }




    </style>    
</head>
<body>
    <!-- 사운드 -->
    <audio autoplay loop muted style="display:none;">
        <source src="" type="audio/mp3">
    </audio>

    <!-- 초대장 페이지 백그라운드 -->
    <div class="snow_wrap">
        <canvas class="snow"></canvas>
    </div>
    
    <!-- 고양이 -->
    <div class="cat-container">
      <img id="cat" src="/image/cat.png" alt="고양이">
    </div>

    <!-- Modal Container -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <p id="letter">"과거로부터 온 행운의 편지입니다. 과거 여행을 수락하시겠습니까?"</p>
            <button id="accept-button">수락하기</button>
        </div>
    </div>

    <p id="typing"></p>


</body>
</html>
