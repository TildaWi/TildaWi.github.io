<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>🌟송년회 초대장🌟</title>
	<script src="https://code.jquery.com/jquery-latest.min.js"></script>
	<script>
		$(document).ready(function(){
			const canvas = $('.snow')[0];
			const context = canvas.getContext('2d');
			
			// 캔버스의 초기 너비와 높이를 설정합니다.
			let canvasWidth = $('.snow_wrap').width();
			let canvasHeight = $('.snow_wrap').height();
			let lastDeviceType = window.innerWidth < 768 ? 'mobile' : 'desktop';
			
			// 눈송이 파티클을 생성하는 함수입니다.
			function createParticles() {
			    snowParticles = []; 
			    const particleCount = lastDeviceType === 'mobile' ? 40 : 100; 
			    for (let i = 0; i < particleCount; i++) {
			        snowParticles.push(new createParticle());
			    }
			}
			
			// 캔버스의 크기를 조정하는 함수입니다.
			function setCanvasSize() {
			    const currentDeviceType = window.innerWidth < 768 ? 'mobile' : 'desktop';
			    if (currentDeviceType !== lastDeviceType) {
			        lastDeviceType = currentDeviceType;
			        createParticles();
			    }
			    
			    const tempCanvas = document.createElement('canvas');
			    const tempCtx = tempCanvas.getContext('2d');
			    tempCanvas.width = canvasWidth;
			    tempCanvas.height = canvasHeight;
			    tempCtx.drawImage(canvas, 0, 0);
			
			    canvasWidth = $('.snow_wrap').width();
			    canvasHeight = $('.snow_wrap').height();
			    canvas.width = canvasWidth;
			    canvas.height = canvasHeight;
			
			    context.drawImage(tempCanvas, 0, 0);
			}
			
			let snowParticles = []; 
			
			function createParticle() {
			    this.x = Math.random() * canvasWidth;
			    this.y = Math.random() * canvasHeight;
			    this.vx = Math.random() * 4 - 1;
			    this.vy = Math.random() * 4 + 1;
			    this.color = `rgba(255, 255, 255, ${Math.random()})`;
			    this.radius = Math.random() * 5 + 2;
			}
			
			function draw() {
			    context.clearRect(0, 0, canvasWidth, canvasHeight); 
			    snowParticles.forEach(function(particle) {
			        context.beginPath();
			        let gradient = context.createRadialGradient(particle.x, particle.y, 0, particle.x, particle.y, particle.radius);
			        gradient.addColorStop(1, particle.color);
			        gradient.addColorStop(1, "rgb(66, 66, 66)");
			        context.fillStyle = gradient;
			        context.arc(particle.x, particle.y, particle.radius, Math.PI * 2, false);
			        context.fill();
			        particle.x += particle.vx;
			        particle.y += particle.vy;
			        if (particle.x < -50) particle.x = canvasWidth + 50;
			        if (particle.y < -50) particle.y = canvasHeight + 50;
			        if (particle.x > canvasWidth + 50) particle.x = -50;
			        if (particle.y > canvasHeight + 50) particle.y = -50;
			    });
			}
			
			$(window).resize(setCanvasSize);
			setCanvasSize(); 
			createParticles(); 
			setInterval(draw, 33); 
			
			// 애니메이션 진행 및 보이기/숨기기 효과
			const bearOff = $(".bear_off");
			const bearOn = $(".bear_on");

			bearOff.animate({
				transform: "scale(1)"
			}, 2000, function() {
				// 크기 변화가 완료되면 bear_off 이미지는 숨기고, bear_on 이미지를 나타냄
				bearOff.hide();
				bearOn.show();
			});

		});
	</script>
	<style>
		html, body {
			height: 100%; 
			margin: 0; 
			padding: 0;
			overflow-x: hidden; 
			display: flex;
			justify-content: center;
			align-items: center;
			background-color: #f0f0f0;
		}

		.snow_wrap { 
			position: absolute;
			top: 0; 
			left: 0; 
			width: 100%;
			height: 100%;
			overflow: hidden;
			z-index: -1; 
		}
		
		.snow { 
			width: 100%;
			height: 100%;
			background: #141f3e;
		} 
		
		.bear_wrap { 
			position: relative;
			z-index: 3;
		}
		
		.bear_off { 
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%) scale(0);
			transition: transform 2s ease;
			z-index: 2;
		}
		
		.bear_on { 
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			display: none;
			z-index: 1;
		}

	</style>	
</head>
<body>
	<div class="snow_wrap">
		<canvas class="snow"></canvas>
	</div>
	
	<div class="bear_wrap">
		<img class="bear_off" src="https://github.com/user-attachments/assets/711a66f8-37a2-4239-b28a-0f5a145fb487" alt="산타곰_꺼짐">
		<img class="bear_on" src="https://github.com/user-attachments/assets/021de9ac-3d3d-4ee3-a52c-b9a383cb12f6" alt="산타곰_켜짐">
	</div>
</body>
</html>
