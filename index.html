<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과거로부터의 초대</title>
    <script src="https://code.jquery.com/jquery-latest.min.js"></script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        body {
            width: 100%;
            font-family: Arial, sans-serif;
            position: relative;
        }

        /*눈 내리는 효과*/
        .snow_wrap { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }
        
        .snow { 
            width: 100%;
            height: 100%;
            background: #222834;
        } 

        /*사용자 타이핑 효과*/
        .first-sentence {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Courier New', Courier, monospace;
            font-size: 20px;
            text-align: center;
            color: white;
            z-index: 1;
            opacity: 0;
            animation: fadeInOut 5s forwards;
            filter: drop-shadow(0 0 10px white);
        }

        .second-sentence {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Courier New', Courier, monospace;
            font-size: 20px;
            text-align: center;
            color: white;
            z-index: 1;
            opacity: 0;
            animation: fadeInOut 5s forwards;
            filter: drop-shadow(0 0 10px white);
        }

        @keyframes fadeInOut {
            0% {
                opacity: 0;
            }
            20%, 80% {
                opacity: 1;
                filter: drop-shadow(0 0 10px white);
            }
            100% {
                opacity: 0;
            }
        }

        /*고양이 이미지 효과*/
        .cat-container {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            opacity: 0;
            animation: scaleUp 7s 15s forwards; /* 후광 효과 2초 느리게 적용 */
        }
        
        #cat {
            max-width: 250px;
            width: 100%;
            height: auto;
            filter: drop-shadow(0 0 10px transparent);
        }
        
        @keyframes scaleUp {
            0% {
                transform: scale(0.2);
                filter: drop-shadow(0 0 10px transparent);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 20px #ffd700);
                opacity: 1;
            }
        }

        /*모달창 효과*/
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        
        .modal-content {
            background: white;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            animation: fadeIn 0.7s;
            opacity: 0.5;
        }

        .modal-content h1 {
            font-size: 20px;
        }

        .accept-button {
            background-color: pink;
            font-color: #ffffff;
            font-size: 16px;
        }
        
        .reject-button {
            background-color: black;
            font-color: red;
            font-size: 16px;
        }
      
        .hidden {
            display: none; /* hidden 클래스 스타일 정의 */
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
    </style>    
</head>
<body>
    <div class="snow_wrap">
        <canvas class="snow"></canvas>
    </div>

    <!-- 첫 번째 문장 -->
    <div class="first-sentence" style="animation-delay: 0s;">
        <p>지금은 2024년,</p> 
        <p>추운겨울...</p>
        <p>어디 재밌는 일 좀 뭐 없나....</p>
    </div>

    <!-- 두 번째 문장 -->
    <div class="first-sentence" style="animation-delay: 5s;">
        <p>저게 뭐지?</p> 
        <p>뭔가 다가오는데...</p>
        <p>고양이? 고양이가 오고 있는 건가....?</p>
    </div>

    <!-- 세 번째 문장 -->
    <div class="first-sentence" style="animation-delay: 12s;">
        <p>안녕하세요,</p>
        <p>(주)오합지졸에서 보낸 편지를 찾으러 오셨나요?</p>
    </div>

    <!-- 네 번째 문장 -->
    <div class="first-sentence" style="animation-delay: 19s;">
      <p>잘 오셨네요 마침</p>
      <p>과거로부터의 편지가 도착했는데...</p>
    </div>

    <!-- 다섯 번째 문장 -->
    <div class="first-sentence" style="animation-delay: 26s;">
      <p>편지를 받는 건 본인 자유...</p>
      <p>받길 희망하신다면 저를 클릭해주세요</p>
    </div>

    <!-- 고양이 컨테이너 -->
    <div class="cat-container">
        <img id="cat" src="/image/cat.png" alt="고양이">
    </div>  
  
    <!-- 모달창 컨테이너 -->
    <div id="modal" class="modal hidden">
      <div class="modal-content">
        <h1>※ (주) 오합지졸 ※</h1>
        <p>이 편지는 12년 전 과거로부터 온 행운의 편지입니다.</p>
        <button id="accept-button">수락하기</button>
        <button id="reject-button">거절하기</button>
      </div>
    </div>

<script>
    $(document).ready(function () {
        const canvas = $('.snow')[0];
        const context = canvas.getContext('2d');
        let canvasWidth = $('.snow_wrap').width();
        let canvasHeight = $('.snow_wrap').height();
        let snowParticles = [];

        function createParticles() {
            snowParticles = [];
            const particleCount = window.innerWidth < 768 ? 40 : 100;
            for (let i = 0; i < particleCount; i++) {
                snowParticles.push(new createParticle());
            }
        }

        function setCanvasSize() {
            canvasWidth = $('.snow_wrap').width();
            canvasHeight = $('.snow_wrap').height();
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
        }

        function createParticle() {
            this.x = Math.random() * canvasWidth;
            this.y = Math.random() * canvasHeight;
            this.vx = Math.random() * 4 - 1;
            this.vy = Math.random() * 4 + 1;
            this.radius = Math.random() * 5 + 2;
        }

        function draw() {
            context.clearRect(0, 0, canvasWidth, canvasHeight);
            snowParticles.forEach(function (particle) {
                context.beginPath();
                context.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
                context.fillStyle = "rgba(255, 255, 255, 0.8)";
                context.fill();
                particle.x += particle.vx;
                particle.y += particle.vy;

                if (particle.x < -50) particle.x = canvasWidth + 50;
                if (particle.y > canvasHeight + 50) particle.y = -50;
            });
        }

        $(window).resize(setCanvasSize);
        setCanvasSize();
        createParticles();
        setInterval(draw, 33);

        // 고양이 클릭 시 모달 열기
        $('#cat').on('click', function () {
            $('#modal').removeClass('hidden');
        });

        // 수락하기 버튼 클릭 시 새 창 열기
        $('#accept-button').on('click', function () {
            window.open('past.html', '_blank');
        });

        // 초기 설정
        $('#modal').addClass('hidden');
    });
</script>

</body>
</html>
