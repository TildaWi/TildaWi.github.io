<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟송년회 초대장🌟</title>
    <script src="https://code.jquery.com/jquery-latest.min.js"></script>
    <script>
        alert("주의! 이어폰을 착용하거나 음소거를 설정해주세요!")
        $(document).ready(function(){
            const canvas = $('.snow')[0];
            const context = canvas.getContext('2d');
            
            let canvasWidth = $('.snow_wrap').width();
            let canvasHeight = $('.snow_wrap').height();
            let lastDeviceType = window.innerWidth < 768 ? 'mobile' : 'desktop';
            
            function createParticles() {
                snowParticles = []; 
                const particleCount = lastDeviceType === 'mobile' ? 40 : 100; 
                for (let i = 0; i < particleCount; i++) {
                    snowParticles.push(new createParticle());
                }
            }
            
            function setCanvasSize() {
                const currentDeviceType = window.innerWidth < 768 ? 'mobile' : 'desktop';
                if (currentDeviceType !== lastDeviceType) {
                    lastDeviceType = currentDeviceType;
                    createParticles();
                }
                
                const tempCanvas = document.createElement('canvas');
                const tempCtx = tempCanvas.getContext('2d');
                tempCanvas.width = canvasWidth;
                tempCanvas.height = canvasHeight;
                tempCtx.drawImage(canvas, 0, 0);
            
                canvasWidth = $('.snow_wrap').width();
                canvasHeight = $('.snow_wrap').height();
                canvas.width = canvasWidth;
                canvas.height = canvasHeight;
            
                context.drawImage(tempCanvas, 0, 0);
            }

            let snowParticles = []; 

            function createParticle() {
                this.x = Math.random() * canvasWidth;
                this.y = Math.random() * canvasHeight;
                this.vx = Math.random() * 4 - 1;
                this.vy = Math.random() * 4 + 1;
                this.color = `rgba(255, 255, 255, ${Math.random()})`;
                this.radius = Math.random() * 5 + 2;
            }

            function draw() {
                context.clearRect(0, 0, canvasWidth, canvasHeight);
                snowParticles.forEach(function(particle) {
                    context.beginPath();
                    let gradient = context.createRadialGradient(particle.x, particle.y, 0, particle.x, particle.y, particle.radius);
                    gradient.addColorStop(1, particle.color);
                    gradient.addColorStop(1, "rgb(66, 66, 66)");
                    context.fillStyle = gradient;
                    context.arc(particle.x, particle.y, particle.radius, Math.PI * 2, false);
                    context.fill();
                    particle.x += particle.vx;
                    particle.y += particle.vy;
                    if (particle.x < -50) particle.x = canvasWidth + 50;
                    if (particle.y < -50) particle.y = canvasHeight + 50;
                    if (particle.x > canvasWidth + 50) particle.x = -50;
                    if (particle.y > canvasHeight + 50) particle.y = -50;
                });
            }

            $(window).resize(setCanvasSize);
            setCanvasSize(); 
            createParticles(); 
            setInterval(draw, 33); 
        });
    </script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        body {
            width: 1080xp;
            font-family: Arial, sans-serif;
            position: relative;
        }
        
        .snow_wrap { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("https://github.com/user-attachments/assets/8e09a3ad-cc1e-4fd4-9535-0b22201b5f0f");
            background-size: cover;  /* 배경 크기를 화면에 맞게 설정 */
            background-position: center;  /* 배경을 중앙에 배치 */
            overflow: hidden;
            z-index: 0;  /* 배경 이미지를 맨 뒤로 설정 */
        }
        
        .snow { 
            width: 100%;
            height: 100%;
        } 
        
        .bear_wrap { 
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;  /* 산타곰이 배경 이미지 위에 보이도록 설정 */
        }
        
        .baer { 
            max-width: 100%
            height: auto;
        }
    </style>    
</head>
<body>
    <!-- 사운드 -->
    <audio autoplay loop muted style="display:none;">
        <source src="https://raw.githubusercontent.com/TildaWi/TildaWi.github.io/main/snow-and-christmas-261290.mp3" type="audio/mp3">
    </audio>

    <!-- 초대장 페이지 백그라운드 -->
    <div class="snow_wrap">
        <canvas class="snow"></canvas>
    </div>
    
    <!-- 산타곰 -->
    <div class="bear_wrap">
        <img class="baer_on" src="https://github.com/user-attachments/assets/57865773-ddaf-433a-a17c-1c309553b00b" alt="산타곰">
    </div>
</body>
</html>
