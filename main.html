<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>2024 오합지졸 송년회</title>
	<script src="https://code.jquery.com/jquery-latest.min.js"></script>
	<script>
		$(document).ready(function(){
			// 여기에 필요한 자바스크립트 코드 추가
		});
	</script>
  
	<style>
		html, body {
			height: 100%; /* 전체 화면을 차지하도록 설정 */
			margin: 0; /* 기본 여백 제거 */
			padding: 0; /* 기본 패딩 제거 */
			overflow-x: hidden; /* 가로 스크롤 방지 */
		}

		body {
			font-family: Arial, sans-serif; /* 기본 폰트 설정 */
			position: relative; /* 자식 요소가 절대 위치를 사용할 수 있도록 설정 */
		}

		/* 9:16 비율을 유지하는 wrapper */
		.wrap {
			width: 1080px; /* 고정된 너비 */
			height: 1920px; /* 고정된 높이 */
			margin: 0 auto; /* 화면 중앙에 배치 */
			position: relative;
			overflow-y: auto; /* 세로 스크롤이 자동으로 생기도록 설정 */
			scroll-snap-type: y mandatory; /* 스크롤 시 각 섹션이 자연스럽게 붙게 설정 */
		}

		/* 각 섹션에 대한 스타일 */
		.main, .page1, .page2, .page3 {
			width: 100%; /* 전체 너비 */
			height: 100vh; /* 화면 높이에 맞게 */
			display: flex;
			justify-content: center;
			align-items: center;
			font-size: 2rem;
			text-align: center;
			scroll-snap-align: start; /* 스크롤이 섹션의 시작 부분에 맞춰지도록 설정 */
		}

		.main {
			background-image: url("https://github.com/user-attachments/assets/15332194-da0a-4bd5-803f-c7be6971d88b");
			background-size: cover; /* 배경 이미지를 화면에 맞게 채우도록 설정 */
			background-position: center; /* 배경 이미지의 위치 중앙 정렬 */
		}

		.page1 {
			background-color: brown;
		}

		.page2 {
			background-color: orange;
		}

		.page3 {
			background-color: white;
		}

		/* 모바일 기기에서 비율을 유지하기 위한 반응형 처리 */
		@media (max-width: 1080px) {
			.wrap {
				width: 100%; /* 화면이 좁아지면 가로 크기를 화면 크기에 맞춤 */
				height: auto; /* 세로 크기는 비율에 맞추어 자동으로 설정 */
			}
		}

		@media (max-height: 1920px) {
			.wrap {
				height: 100%; /* 화면이 좁아지면 세로 크기를 화면 크기에 맞춤 */
				width: auto; /* 가로 크기는 비율에 맞추어 자동으로 설정 */
			}
		}
	</style>
  
</head>
<body>
	<!-- 사운드 -->
	
	<!-- 전체 스크롤을 위한 랩 -->
	<div class="wrap">

		<!-- 연말 크리스마스 -->
		<div class="main">
			<h1>일자 시간대 안내</h1>
		</div>

		<!-- 1부 시상식 컨셉 -->
		<div class="page1">
			<h1>jazz</h1>
		</div>

		<!-- 2부 미운 우리 이모들 컨셉 -->
		<div class="page2">
			<h1>찌라시</h1>
		</div>

		<!-- etc -->
		<div class="page3">
			<h1>위치 오는길 안내</h1>
		</div>

	</div>

</body>
</html>
