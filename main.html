<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title> 2024 오합지졸 송년회 </title></title>
	<script src="https://code.jquery.com/jquery-latest.min.js"></script>
	<script>
		
		$(document).ready(function(){
			

		});
    
	</script>
  
	<style>
		html, body {
			height: 100%; /* 전체 화면을 차지하도록 설정 */
			margin: 0; /* 기본 여백 제거 */
			padding: 0; /* 기본 패딩 제거 */
			overflow-x: hidden; /* 가로 스크롤 방지 */
		}

		body {
		  	font-family: Arial, sans-serif; /* 기본 폰트 설정 */
		  	position: relative; /* 자식 요소가 절대 위치를 사용할 수 있도록 설정 */
		}
		
		.wrap {
			position: absolute; /* 또는 fixed, relative 등 필요에 맞게 설정 */
  			top: 0; /* 원하는 위치에 맞게 조정 */
			left: 0; /* 원하는 위치에 맞게 조정 */
			width: 100%; /* 화면 전체를 덮도록 설정 */
			height: 100%; /* 화면 전체를 덮도록 설정 */
			overflow: hidden;  /* 눈이 화면을 벗어나지 않도록 숨김 */
		}

		.main {
			width: 100%;
			height: 100%;
			background-color: red;
		}

		.page1 {
			width: 100%;
			height: 100%;
			background-color: brown;
		}

		.page2 {
			width: 100%;
			height: 100%;
			background-color: orange;
		}

		.page3 {
			width: 100%;
			height: 100%;
			background-color: white;
		}
		
	</style>
  
</head>
  
<body>
	<!-- 사운드 -->
	
	<!--  -->
	<div class="wrap">

	    	<!-- 연말 크리스마스 -->
	    	<div class="main">
	    		<h1>일자 시간대 안내</h1>
	    	</div>

		<!-- 1부 시상식 컨셉 -->
	    	<div class="page1">
	    		<h1>jazz</h1>
	    	</div>

		<!-- 2부 미운 우리 이모들 컨셉 -->
	    	<div class="page2">
	    		<h1>찌라시</h1>
	    	</div>

		<!-- etc -->
	    	<div class="page3">
	    		<h1>위치 오는길 안내</h1>
	    	</div>

	</div>
  
</body>
</html>
