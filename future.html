<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://code.jquery.com/jquery-latest.min.js"></script>
<style>
        @font-face {
            font-family: 'IyagiGGC';
            src: url('https://cdn.jsdelivr.net/gh/JuwanPark/IyagiGGC@latest/IyagiGGC.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'IyagiGGC';
            color: #ffffff;
            overflow: hidden;
        }

        #main-container {
            height: 100%;
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            position: relative;
        }

        .header-placeholder {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 15px;
            background-color: #ffffff;;
            z-index: 100;
            visibility: hidden; /* Make it not visible */
        }

        .section {
            height: 100vh;
            scroll-snap-align: start;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background-color: black;
        }

        .section img {
            position: absolute;
            z-index: 0;
            max-width: 100%;
            width: 100%;
            height: auto;
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }

        .scroll-down {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: bounce 1.5s infinite;
        }

        .scroll-down span {
            margin: 0;
            font-size: 16px;
            text-align: center;
            color: black;
            text-shadow: 0px 0px 5px gray;
        }

        .triangle {
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 15px solid black;
            margin-top: 5px;
            filter: drop-shadow(0px 4px 4px gray);
        }

        @keyframes bounce {
            0%, 100% {
                transform: translate(-50%, 0);
            }
            50% {
                transform: translate(-50%, -10px);
            }
        }

        .leaf {
            position: absolute;
            width: 20px;
            height: 20px;
            background: linear-gradient(-45deg, #42b02c 0%, #57b045 40%, #86d676 80%);
            border-radius: 10% 50% 40% 50%;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            z-index: 1;
            pointer-events: none;
            animation: fall 11s linear infinite;
        }

        @keyframes fall {
            0% {
                top: -50px;
                opacity: 1;
            }

            80% {
                opacity: 1;
            }

            100% {
                top: 100vh;
                opacity: 0;
            }
        }

        @keyframes scale-up {
            0% {
                transform: scale(1);
                font-size: 18px;
            }

            100% {
                transform: scale(1.2);
                font-size: 40px;
            }
        }

        .h1-scale {
            position: relative;
            z-index: 2;
            text-align: center;
            animation: scale-up 4s ease-in-out forwards;
            font-color: #ffffff;
            margin-top: 40px;
        }
</style>
</head>
