<title>back to 2012</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://code.jquery.com/jquery-latest.min.js"></script>
<style>
        @font-face {
            font-family: 'IyagiGGC';
            src: url('https://cdn.jsdelivr.net/gh/JuwanPark/IyagiGGC@latest/IyagiGGC.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'IyagiGGC';
            color: #ffffff;
            overflow: hidden;
        }

        #main-container {
            height: 100%;
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            position: relative;
        }

        .section {
            height: 100vh;
            scroll-snap-align: start;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .section img {
            position: absolute;
            z-index: 1;
            max-width: 100%;
            width: 100%;
            height: auto;
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }

        .scroll-down {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: bounce 1.5s infinite;
        }

        .scroll-down p {
            margin: 0;
            font-size: 16px;
            text-align: center;
            color: black;
            text-shadow: 0px 0px 4px gray;
        }

        .triangle {
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 15px solid black;
            margin-top: 5px;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translate(-50%, 0);
            }
            50% {
                transform: translate(-50%, -10px);
            }
        }

        .leaf {
            position: absolute;
            background: linear-gradient(-45deg, #ffb6c1 0%, #ffc5d0 40%, #ffdfe6 80%);
            border-radius: 10% 50% 40% 50%;
            z-index: 2;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            pointer-events: none;
            transform-style: preserve-3d;
            transition: transform 1000ms linear;
        }

        @keyframes fall {
              0% {
                  top: 0;
                  opacity: 1;
              }
          
              80% {
                  opacity: 1;
              }
          
              100% {
                  top: 100%;
                  opacity: 0.2;
              }
          }

        .section h1 {
            position: absolute;
            width: 100%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            margin: 0;
            font-size: 32px;
            color: white;
        }

        .section p {
            position: absolute;
            width: 100%;
            top: calc(50% + 25px);
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            margin: 0;
            font-size: 28px;
            color: white;
        }
</style>
</head>

    <script>
        function scrollToNextSection(index) {
            const sections = document.querySelectorAll('.section');
            if (index < sections.length) {
                sections[index].scrollIntoView({ behavior: 'smooth' });
            }
        }

        // Generate leaf elements
        function generateLeaves() {
            const mainContainer = document.getElementById('main-container');
            for (let i = 0; i < 30; i++) {
                const leaf = document.createElement('div');
                leaf.classList.add('leaf');
                leaf.style.left = Math.random() * 100 + 'vw';
                leaf.style.animationDuration = Math.random() * 3 + 2 + 's';
                leaf.style.animationDelay = Math.random() * 5 + 's';
                mainContainer.appendChild(leaf);
            }
        }

        generateLeaves();
    </script>
