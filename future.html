<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2024 오합지졸 송년회</title>
    <script src="https://code.jquery.com/jquery-latest.min.js"></script>

<style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #main-container {
            height: 100%;
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
        }

        .section {
            height: 100vh;
            scroll-snap-align: start;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .section img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            max-width: 840px; /* Ensure max width is 840px */
            display: block;
            margin: 0 auto;
        }

        .scroll-down {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .scroll-down p {
            margin: 0;
            font-size: 14px;
        }

        .triangle {
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 15px solid #000;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div id="main-container">
        <section class="section" style="background-color: lightblue;">
            <img src="image1.jpg" alt="Image 1">
            <div class="scroll-down" onclick="scrollToNextSection(1)">
                <p>Scroll Down</p>
                <div class="triangle"></div>
            </div>
        </section>
        <section class="section" style="background-color: lightgreen;">
            <img src="image2.jpg" alt="Image 2">
            <div class="scroll-down" onclick="scrollToNextSection(2)">
                <p>Scroll Down</p>
                <div class="triangle"></div>
            </div>
        </section>
        <section class="section" style="background-color: lightcoral;">
            <img src="image3.jpg" alt="Image 3">
        </section>
    </div>

    <script>
        function scrollToNextSection(index) {
            const sections = document.querySelectorAll('.section');
            if (index < sections.length) {
                sections[index].scrollIntoView({ behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
