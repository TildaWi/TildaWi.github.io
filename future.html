<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>back to 2012</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://code.jquery.com/jquery-latest.min.js"></script>
<style>
        @font-face {
            font-family: 'IyagiGGC';
            src: url('https://cdn.jsdelivr.net/gh/JuwanPark/IyagiGGC@latest/IyagiGGC.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'IyagiGGC';
            color: #ffffff;
            overflow: hidden;
        }

        #main-container {
            height: 100%;
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            position: relative;
        }

        .section {
            height: 100vh;
            scroll-snap-align: start;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .section img {
            position: absolute;
            z-index: 0;
            max-width: 100%;
            width: 100%;
            height: auto;
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }

        .scroll-down {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: bounce 1.5s infinite;
        }

        .scroll-down span {
            margin: 0;
            font-size: 16px;
            text-align: center;
            color: black;
            text-shadow: 0px 0px 4px gray;
        }

        .triangle {
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 15px solid black;
            margin-top: 5px;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translate(-50%, 0);
            }
            50% {
                transform: translate(-50%, -10px);
            }
        }

        .leaf {
            position: absolute;
            width: 20px;
            height: 20px;
            background: linear-gradient(-45deg, #42b02c 0%, #57b045 40%, #86d676 80%);
            border-radius: 10% 50% 40% 50%;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            z-index: 1;
            pointer-events: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                top: -50px;
                opacity: 1;
            }

            80% {
                opacity: 1;
            }

            100% {
                top: 100vh;
                opacity: 0;
            }
        }
</style>
</head>
<body>
    <div id="main-container">
        <section class="section">
            <img src="/image/main_bg.png" alt="Main Background">
            <h1 style="position: relative; z-index: 2;">응답하라</h1>
            <p style="position: relative; z-index: 2;">2012</p>
        </section>
        <section class="section">
            <img src="/image/page_01.png" alt="Page 01">
        </section>
        <section class="section">
            <img src="/image/page_02.png" alt="Page 02">
        </section>
        <section class="section">
            <img src="/image/page_03.png" alt="Page 03">
        </section>
        <section class="section">
            <img src="/image/page_04.png" alt="Page 04">
        </section>
        <section class="section">
            <img src="/image/page_05.png" alt="Page 05">
        </section>
        <section class="section">
            <img src="/image/page_06.png" alt="Page 06">
        </section>
        <section class="section">
            <img src="/image/page_07.gif" alt="Page 07">
        </section>
        <section class="section">
            <img src="/image/page_08.png" alt="Page 08">
        </section>
        <section class="section">
            <img src="/image/page_09.png" alt="Page 09">
        </section>
        <section class="section">
            <img src="/image/page_10.png" alt="Page 10">
        </section>
        <section class="section">
            <img src="/image/page_11.png" alt="Page 11">
        </section>
        <section class="section">
            <img src="/image/page_12.png" alt="Page 12">
        </section>
        <div class="scroll-down" onclick="scrollToNextSection(1)">
            <span>여기를 눌러줘!!</span>
            <div class="triangle"></div>
        </div>
    </div>

    <script>
        function scrollToNextSection(index) {
            const sections = document.querySelectorAll('.section');
            if (index < sections.length) {
                sections[index].scrollIntoView({ behavior: 'smooth' });
            }
        }

        function generateLeaves() {
            const mainContainer = document.getElementById('main-container');
            for (let i = 0; i < 30; i++) {
                const leaf = document.createElement('div');
                leaf.classList.add('leaf');
                leaf.style.left = Math.random() * 100 + 'vw';
                leaf.style.animationDuration = Math.random() * 3 + 2 + 's';
                leaf.style.animationDelay = Math.random() * 5 + 's';
                mainContainer.appendChild(leaf);
            }
        }

        generateLeaves();
    </script>
</body>
</html>
