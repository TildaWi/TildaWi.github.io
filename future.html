<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>back to 2012</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://code.jquery.com/jquery-latest.min.js"></script>
<style>
        @font-face {
            font-family: 'IyagiGGC';
            src: url('https://cdn.jsdelivr.net/gh/JuwanPark/IyagiGGC@latest/IyagiGGC.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'IyagiGGC';
            font-color: #ffffff;
            overflow: hidden;
        }

        #main-container {
            height: 100%;
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
        }

        .section {
            height: 100vh;
            scroll-snap-align: start;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .section img {
            max-width: 100%;
            width: 100%; /* Ensure the image scales correctly on mobile */
            height: auto;
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }

        .scroll-down {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .scroll-down p {
            margin: 0;
            font-size: 14px;
        }

        .triangle {
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 15px solid #000;
            margin-top: 5px;
        }

        .footer {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div id="main-container">
        <section class="section">
            <img src="/image/main_bg.png" alt="Main Background">
            <h1>응답하라</h1>
            <p>2012</p>
            <div class="scroll-down" onclick="scrollToNextSection(1)">
                <p>Scroll Down</p>
                <div class="triangle"></div>
            </div>
        </section>
        <section class="section">
            <img src="/image/page_01.png" alt="Page 01">
            <div class="scroll-down" onclick="scrollToNextSection(2)">
                <p>Scroll Down</p>
                <div class="triangle"></div>
            </div>
        </section>
        <section class="section">
        <img src="/image/page_02.png" alt="Page 02">
            <div class="scroll-down" onclick="scrollToNextSection(3)">
                <p>Scroll Down</p>
                <div class="triangle"></div>
            </div>
        </section>
        <section class="section">
            <img src="/image/page_03.png" alt="Page 03">
            <div class="scroll-down" onclick="scrollToNextSection(4)">
                <p>Scroll Down</p>
                <div class="triangle"></div>
            </div>
        </section>
                <section class="section">
            <img src="/image/page_04.png" alt="Page 04">
            <div class="scroll-down" onclick="scrollToNextSection(5)">
                <p>Scroll Down</p>
                <div class="triangle"></div>
            </div>
        </section>
                <section class="section">

            <div class="scroll-down" onclick="scrollToNextSection(6)">

            <div class="scroll-down" onclick="scrollToNextSection(7)">

        </section>
                <section class="section">

        </section>

        <div class="footer">

        </div>
    </div>

    <script>
        function scrollToNextSection(index) {
            const sections = document.querySelectorAll('.section');
            if (index < sections.length) {
                sections[index].scrollIntoView({ behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
