<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Back to the 2012!</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* 기본 스타일 */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(to bottom, #ffb6c1, #ffffff);
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            background-size: cover;
            cursor: none;
        }

        /* 벚꽃 효과 */
        .cherry-blossom {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .cherry-blossom .petal {
            position: absolute;
            width: 20px;
            height: 20px;
            background: pink;
            border-radius: 50%;
            opacity: 0.8;
            animation: fall 10s linear infinite, sway 3s ease-in-out infinite;
        }

        @keyframes fall {
            from { transform: translateY(-10vh); }
            to { transform: translateY(100vh); }
        }

        @keyframes sway {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(20px); }
        }

        /* 로딩 화면 */
        .loading-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            opacity: 0;
            animation: fadeIn 2s forwards;
            z-index: 2;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .loading-text {
            font-size: 20px;
            color: #333;
            margin-bottom: 20px;
        }

        .progress-bar {
            width: 300px;
            height: 15px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin: 0 auto;
        }

        .progress {
            height: 100%;
            width: 0;
            background: #ff69b4;
        }

        /* 스마트폰 화면 */
        .phone-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 700px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            display: none;
            overflow: hidden;
        }

        .header {
            height: 50px;
            background: linear-gradient(to bottom, #ffb6c1, #ffffff);
        }

        .app-icon {
            display: inline-block;
            width: 80px;
            height: 80px;
            margin: 20px 15px;
            background: #ffb6c1;
            border-radius: 15px;
            text-align: center;
            line-height: 80px;
            color: white;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <!-- 벚꽃 효과 -->
    <div class="cherry-blossom"></div>

    <!-- 로딩 화면 -->
    <div class="loading-container">
        <div class="loading-text">Back to the 2012, Loading...</div>
        <div class="progress-bar">
            <div class="progress"></div>
        </div>
    </div>

    <!-- 스마트폰 화면 -->
    <div class="phone-screen">
        <div class="header"></div>
        <div style="padding: 20px; text-align: center;">
            <div class="app-icon">notes</div>
            <div class="app-icon">disc</div>
            <div class="app-icon">pins</div>
            <div class="app-icon">chrome</div>
            <div class="app-icon">snap</div>
            <div class="app-icon">twitt</div>
            <div class="app-icon">insta</div>
            <div class="app-icon">mail</div>
        </div>
    </div>

    <script>
        // 벚꽃 효과
        const cherryBlossom = document.querySelector('.cherry-blossom');
        for (let i = 0; i < 50; i++) {
            const petal = document.createElement('div');
            petal.className = 'petal';
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.animationDuration = Math.random() * 5 + 3 + 's';
            cherryBlossom.appendChild(petal);
        }

        // 로딩 화면
        const progress = document.querySelector('.progress');
        const phoneScreen = document.querySelector('.phone-screen');

        setTimeout(() => {
            progress.style.width = '100%';
        }, 100);

        setTimeout(() => {
            document.querySelector('.loading-container').style.display = 'none';
            phoneScreen.style.display = 'block';
        }, 15000); // 15초 후 스마트폰 화면 표시
    </script>
</body>
</html>
