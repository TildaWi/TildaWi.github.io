<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>back to 2012</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://code.jquery.com/jquery-latest.min.js"></script>
<style>
    @font-face {
      font-family: 'IyagiGGC';
      src: url('https://cdn.jsdelivr.net/gh/JuwanPark/IyagiGGC@latest/IyagiGGC.woff') format('woff');
      font-weight: normal;
      font-style: normal;
    }
    * { 
        margin: 0; 
        padding: 0; 
        font-family: 'Noto Sans KR', sans-serif; 
        box-sizing: border-box; 
    }   
    
    ul, li { 
        list-style: none;
    }
    
    body {
        
    }
    
    .wrap {
        position: relative;
        width: 100%;
        max-width: 840px;
        height: 100%;
        text-align: center;
        background: linear-gradient(to bottom, #ffb6c1, #ffffff);
    }
    
    .cherry_blossom{
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100%;
        height: 100%;
        z-index: 1;
        background-color: #000000;
        opacity: 0.5;
    }
        
    .con-box {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100%;
        height: 100%;
        z-index: 2;
    }

    .main {
        width: 840px;
        height: 960px;
        background-image: url("/image/main_bg.png");
        background-size: contain; /* 이미지가 잘리지 않게 비율 유지 */
        background-position: center;
        background-repeat: no-repeat;
        
        display: flex;
        justify-content: center;
        align-items: center;  /* 중앙 정렬 */
    }

    /* 이미지 크기 조정 */
    img {
        max-width: 100%;
        height: auto; 
    }

</style>
</head>
<body>
    <div class="wrap">
        <div class="cherry_blossom"></div>
        <div class="con-box">
            <div class="container main">
                <img src="/image/main_bg.png" alt="Main Background">
            </div>
            <div class="container page1">
                <img src="/image/page_01.png" alt="Page 01">                
            </div>
            <div class="container page2">
                <img src="/image/page_02.png" alt="Page 02">                               
            </div>
            <div class="container page3">
                <img src="/image/page_03.png" alt="Page 03">                 
            </div>
            <div class="container page4">
                <img src="/image/page_04.png" alt="Page 04">                  
            </div>
            <div class="container page5">
                <img src="/image/page_05.png" alt="Page 05">                  
            </div>
            <div class="container page6">
                 <img src="/image/page_06.png" alt="Page 06">                 
            </div>
            <div class="container page7">
                   <img src="/image/page_07.png" alt="Page 07">               
            </div>
            <div class="container page8">
                  <img src="/image/page_08.png" alt="Page 08">                
            </div>
            <div class="container page9">
                <img src="/image/page_09.png" alt="Page 09">                  
            </div>
            <div class="container page10">
                <img src="/image/page_10.png" alt="Page 10">                  
            </div>
        </div>
    </div>

<script>
    $(document).ready(function () {  
        // 추가적인 JavaScript 코드
    });
</script>
</body>
</html>
