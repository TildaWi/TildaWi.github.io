<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Back to the 2012!</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* 기본 스타일 */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(to bottom, #ffb6c1, #ffffff);
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            background-size: cover;
            cursor: none;
        }

        /* 벚꽃 효과 */
        .cherry-blossom {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .cherry_blossom .petal {
            position: absolute;
            background: linear-gradient(-45deg, #ffb6c1 0%, #ffc5d0 40%, #ffdfe6 80%);
            border-radius: 10% 50% 40% 50%;
            z-index: 1;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            pointer-events: none;
            transform-style: preserve-3d;
            transition: transform 1000ms linear;
        }
        
        @keyframes fall {
            0% {
                top: 0;
                opacity: 1;
            }
        
            80% {
                opacity: 1;
            }
        
            100% {
                top: 100%;
                opacity: 0.2;
            }
        }

        /* 로딩 화면 */
        .loading-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            opacity: 0;
            animation: fadeIn 6s forwards;
            z-index: 2;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .loading-text {
            margin-bottom: 40px;
        }
        .loading-text lt1 {
            font-size: 18px;
            color: #fff;
            margin-bottom: 10px;
        }
        .loading-text lt2 {
            font-size: 12px;
            color: #fff;
        }

        .progress-bar {
            width: 300px;
            height: 15px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin: 0 auto;
        }

        .progress {
            height: 100%;
            width: 0;
            background: #ff69b4;
        }

        /* 스마트폰 화면 */
        .phone-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 700px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            display: none;
            overflow: hidden;
        }

        .header {
            height: 50px;
            background: linear-gradient(to bottom, #ffb6c1, #ffffff);
        }

        .app-icon {
            display: inline-block;
            width: 80px;
            height: 80px;
            margin: 20px 15px;
            background: #ffb6c1;
            border-radius: 15px;
            text-align: center;
            line-height: 80px;
            color: white;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <!-- 벚꽃 효과 -->
    <div class="cherry-blossom"></div>

    <!-- 로딩 화면 -->
    <div class="loading-container">
        <div class="loading-text">
            <p class="lt1">Back to the 2012,</p>
            <p class="lt2">Loading...</p>
        </div>
        <div class="progress-bar">
            <div class="progress"></div>
        </div>
    </div>

    <!-- 스마트폰 화면 -->
    <div class="phone-screen">
        <div class="header"></div>
        <div style="padding: 20px; text-align: center;">
            <div class="app-icon">notes</div>
            <div class="app-icon">disc</div>
            <div class="app-icon">pins</div>
            <div class="app-icon">chrome</div>
            <div class="app-icon">snap</div>
            <div class="app-icon">twitt</div>
            <div class="app-icon">insta</div>
            <div class="app-icon">mail</div>
        </div>
    </div>

    <script>
        // 벚꽃 효과
        // 기본 값 설정
        const defaults = {
            speed: 5,
            maxSize: 15,
            minSize: 10,
            newOn: 400
        };
        
        // 벚꽃 영역 크기를 저장할 변수
        var $wrap = $('.cherry_blossom');
        let wrapH = $wrap.height();
        let wrapW = $wrap.width();
        
        // 벚꽃 잎 생성
        const $petal = $('<span class="petal"></span>');
        
        // 랜덤 회전 값을 생성하는 함수
        const getRandomRotate = () => {
            const rotateX = 360;
            const rotateY = Math.random() * 60 - 30;
            const rotateZ = Math.random() * 120 - 30;
            const translateX = Math.random() * 10 - 5;
            const translateY = Math.random() * 10 - 10;
            const translateZ = Math.random() * 15;
            return `rotateX(${rotateX}deg) rotateY(${rotateY}deg) rotateZ(${rotateZ}deg) translateX(${translateX}px) translateY(${translateY}px) translateZ(${translateZ}px)`;
        };
        
        // 무작위 흔들림 애니메이션 배열 생성
        const randomSwayAnims = [...Array(10)].map(getRandomRotate);
        
        // 특정 요소에 흔들림 애니메이션 적용
        const applySwayAnim = (element) => {
            const randomSway = randomSwayAnims[Math.floor(Math.random() * randomSwayAnims.length)];
            element.css('transform', randomSway);
            setTimeout(() => {
                applySwayAnim(element);
            }, 1000);
        };
        
        // 벚꽃 잎 생성 함수
        const petalGen = () => {
            setTimeout(requestAnimationFrame, defaults.newOn, petalGen);
        
            const petal = $petal.clone();
            const size = Math.floor(Math.random() * (defaults.maxSize - defaults.minSize + 1)) + defaults.minSize;
            const startPosLeft = Math.random() * wrapW;
            const fallTime = (wrapH * 0.1 + Math.random() * 5) / defaults.speed;
            const horizontalOffset = Math.random() * 2 - 1;
        
            // 애니메이션 끝나면 제거
            petal.on('animationend', () => {
                petal.remove();
            }).css({
                width: size,
                height: size,
                left: startPosLeft,
                position: 'absolute',
                animation: `fall ${fallTime}s linear`
            }).appendTo($wrap);
        
            // 위치 업데이트 함수
            const updatePos = () => {
                petal.css('left', `+=${horizontalOffset}`);
                requestAnimationFrame(updatePos);
            };
        
            updatePos();
            applySwayAnim(petal);
        };
        
        // 창 크기가 변경될 때 영역 크기 업데이트
        $(window).resize(() => {
            wrapH = $wrap.height();
            wrapW = $wrap.width();
        });
        
        // 로딩 완료 후 벚꽃 잎 생성 시작
        $(window).on('load', () => {
            requestAnimationFrame(petalGen);
        });


        // 로딩 화면
        const progress = document.querySelector('.progress');
        const phoneScreen = document.querySelector('.phone-screen');

        setTimeout(() => {
            progress.style.width = '100%';
        }, 100);

        setTimeout(() => {
            document.querySelector('.loading-container').style.display = 'none';
            phoneScreen.style.display = 'block';
        }, 8000); // 80초 후 스마트폰 화면 표시
    </script>
</body>
</html>
