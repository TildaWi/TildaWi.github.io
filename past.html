<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Back to the 2012!</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-latest.min.js"></script>
    <style>
        /* 기본 스타일 */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(to bottom, #ffb6c1, #ffffff);
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            background-size: cover;
        }

        /* 벚꽃 효과 */
        .cherry-blossom {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
        }
 

    </style>
</head>
<body>
    <!-- 벚꽃 효과 -->
    <div class="cherry-blossom"></div>


    <script>
        // 벚꽃 효과
        const defaults = {
            speed: 5,
            maxSize: 15,
            minSize: 10,
            newOn: 400
        };
        const $wrap = $('.cherry-blossom');
        const $petal = $('<span class="petal"></span>');
        let wrapH = $wrap.height();
        let wrapW = $wrap.width();

        const petalGen = () => {
            setTimeout(requestAnimationFrame, defaults.newOn, petalGen);
            const petal = $petal.clone();
            const size = Math.random() * (defaults.maxSize - defaults.minSize) + defaults.minSize;
            const startPosLeft = Math.random() * wrapW;
            const fallTime = Math.random() * 5 + 5;
            petal.css({
                width: size,
                height: size,
                left: startPosLeft,
                position: 'absolute',
                animation: `fall ${fallTime}s linear`
            }).appendTo($wrap);
        };

        $(window).on('load', () => requestAnimationFrame(petalGen));

    </script>
</body>
</html>
