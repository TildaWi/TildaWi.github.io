<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Back to the 2012!</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* 기본 스타일 */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #fff;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            cursor: none;
        }

        /* 벚꽃 효과 */
        .cherry_blossom {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .cherry_blossom .petal {
            position: absolute;
            width: 20px;
            height: 20px;
            background: pink;
            border-radius: 50%;
            opacity: 0.8;
            animation: fall 5s linear infinite, sway 3s ease-in-out infinite;
        }

        @keyframes fall {
            from { transform: translateY(-10vh); }
            to { transform: translateY(100vh); }
        }

        @keyframes sway {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(20px); }
        }

        /* 커스텀 커서 */
        .custom-cursor {
            position: absolute;
            width: 40px;
            height: 40px;
            background-image: url('image/cursor.png');
            background-size: cover;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* 가루 효과 */
        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ffd700;
            border-radius: 50%;
            opacity: 1;
            animation: fadeOut 1s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.5); }
        }

        /* 로딩 화면 */
        .loading-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .loading-text { font-size: 24px; margin-bottom: 20px; }

        .progress-bar {
            width: 300px;
            height: 20px;
            background: #ccc;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            width: 0;
            background: #ff69b4;
            transition: width 10s linear;
        }

        /* 스마트폰 화면 */
        .phone-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 700px;
            background: white;
            border-radius: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="cherry_blossom"></div>
    <div class="custom-cursor" id="customCursor"></div>
    <div class="loading-container">
        <div class="loading-text">Back to the 2012, Loading...</div>
        <div class="progress-bar">
            <div class="progress"></div>
        </div>
    </div>
    <div class="phone-screen"></div>
    <audio id="bgm" autoplay loop>
        <source src="https://example.com/audio.mp3" type="audio/mpeg">
    </audio>

    <script>
        // 벚꽃 효과
        const cherryBlossom = document.querySelector('.cherry_blossom');
        for (let i = 0; i < 100; i++) {
            const petal = document.createElement('div');
            petal.className = 'petal';
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.animationDuration = Math.random() * 3 + 2 + 's';
            cherryBlossom.appendChild(petal);
        }

        // 커스텀 커서
        const cursor = document.getElementById('customCursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = `${e.clientX}px`;
            cursor.style.top = `${e.clientY}px`;
        });

        // 가루 효과
        function createParticle(x, y) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = `${x}px`;
            particle.style.top = `${y}px`;
            document.body.appendChild(particle);
            setTimeout(() => particle.remove(), 1000);
        }

        document.addEventListener('mousemove', (e) => createParticle(e.clientX, e.clientY));

        // 로딩 화면
        const progress = document.querySelector('.progress');
        const phoneScreen = document.querySelector('.phone-screen');
        const bgm = document.getElementById('bgm');

        setTimeout(() => {
            progress.style.width = '100%';
        }, 5000);

        setTimeout(() => {
            document.querySelector('.loading-container').style.display = 'none';
            phoneScreen.style.display = 'block';
            bgm.pause();
        }, 15000);
    </script>
</body>
</html>
