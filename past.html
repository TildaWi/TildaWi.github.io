<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>back to 2012</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://code.jquery.com/jquery-latest.min.js"></script>
<style>
    @font-face {
      font-family: 'IyagiGGC';
      src: url('https://cdn.jsdelivr.net/gh/JuwanPark/IyagiGGC@latest/IyagiGGC.woff') format('woff');
      font-weight: normal;
      font-style: normal;
    }
    * { 
        margin: 0; 
        padding: 0; 
        font-family: 'Noto Sans KR', sans-serif; 
        box-sizing: border-box; 
    }   
    
    ul, li { 
        list-style: none;
    }
    
    body {
        
    }
    
    .wrap {
        position: relative;
        width: 100%;
        max-width: 840px;
        height: 100%;
        text-align: center;
        background: linear-gradient(to bottom, #ffb6c1, #ffffff);
    }
    
    .cherry_blossom{
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100%;
        height: 100%;
        z-index: 1;
        background-color: #000000;
        opacity: 0.5;
    }
        
    .con-box {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100%
        height: 100%;
        z-index: 2;
    }
    
    .container:nth-child(1){
        width: 100%;
        height: 960px;
        background-image: url("/image/main_bg.png"), center center no-repeat;
        background-size: cover;
    }
    
    .scoll down {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translate(-50%);
        width: 200px;
        height: 100px;
        background-color: grey; 
        
    }
    
    .scoll down p {
        font-family: IyagiGGC;
        font-size: 28px;
    }
    
    .triangle {
        width: 0;
        height: 0;
        border-bottom: 30px solid transparent;
        border-top: 30px solid transparent;
        border-left: 50px solid skyblue;
        border-right: 50px solid transparent;
        animation: motion 0.3s linear 0s infinite alternate; 
        margin-top: 0;
    }
        
    @keyframes motion {
        0% {margin-top: 0px;}
        100% {margin-top: 10px;}
    }
    
    .container:nth-child(2){
        background-color: orange;
    }
    
    .container:nth-child(3){
        background-color: yellow;
    }
    
    .container:nth-child(4){
        background-color: red;
    }
        
</style>
<body>
    <div class="wrap">
        <div class="cherry_blossom">sdfsdfsdfsdf</div>
        <div class="con-box">
            <div class="container main">
                <img class="" src="" alt="">
                <img class="" src="" alt="">
                <img class="" src="" alt="">
                <div class="scroll down">
                    <p>scoll down</p>
                    <div class="triangle"></div>
                <div>
            </div>
            <div class="container">
                
            </div>
            <div class="container">
                
            </div>
            <div class="container">
                
            </div>
        </div>
    </div>

<script>
    $(document).ready(function () {  
        

        };
    </script>
</body>
</html>
