<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Back to the 2012!</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"> <!-- 레트로 폰트 -->
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #ffffff; /* 메인컬러는 연분홍 과 흰색 */
            font-family: 'Press Start 2P', cursive; /* 레트로 폰트 */
            overflow: hidden;
        }

        /*벚꽃 흩날리는 효과*/
        .cherry_blossom {
            overflow: hidden;
            position: relative;
            width: 600px;
            height: 600px;
            background: url('sakura.png') center center no-repeat;
            background-size: cover;
            perspective: 1000px;
        }
        
        .cherry_blossom .petal {
            position: absolute;
            background: linear-gradient(-45deg, #ffb6c1 0%, #ffc5d0 40%, #ffdfe6 80%);
            border-radius: 10% 50% 40% 50%;
            z-index: 1;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            pointer-events: none;
            transform-style: preserve-3d;
            transition: transform 1000ms linear;
        }
        
        @keyframes fall {
            0% {
                top: 0;
                opacity: 1;
            }
        
            80% {
                opacity: 1;
            }
        
            100% {
                top: 100%;
                opacity: 0.2;
            }
        }


        /*로딩 프로그래스바 효과*/
        .loading-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .loading-text {
            font-size: 24px;
            color: #ff69b4;
            margin-bottom: 20px;
        }

        .progress-bar {
            position: relative;
            width: 300px;
            height: 20px;
            background-color: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
            margin: 0 auto;
        }

        .progress {
            position: absolute;
            height: 100%;
            width: 0;
            background-color: #ff69b4;
            transition: width 5s linear;
        }

        /*잠금 해제 후 스마트폰 화면 효과*/
        .phone-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 700px;
            background-color: #fff;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            display: none; /* 초기 숨김 */
            overflow: hidden;
        }

        .app-icon {
            display: inline-block;
            width: 80px;
            height: 80px;
            margin: 15px;
            background-color: #ffcccb;
            border-radius: 15px;
            text-align: center;
            line-height: 80px;
            font-size: 14px;
            color: #fff;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            cursor: pointer;
        }
        
    </style>
</head>
<body>
    <!-- 벚꽃 효과 -->
    <div class="cherry-blossom"></div>

    <!-- 로딩 화면 -->
    <div class="loading-container">
        <div class="loading-text">
            <p class="">Back to the 2012, </p>
            <p>Loading... </p>
        </div> 
        <div class="progress-bar">
            <div class="progress"></div>
        </div>
    </div>

    <!-- 스마트폰 잠금 화면 -->
    <div class="phone-screen">
        <div class="app-icon">앱 1</div>
        <div class="app-icon">앱 2</div>
        <div class="app-icon">앱 3</div>
        <div class="app-icon">앱 4</div>
    </div>

    <!-- BGM -->
    <audio id="bgm" autoplay loop>
        <source src="https://soundcloud.com/some-audio-link.mp3" type="audio/mpeg">
    </audio>

    <script>
        // 벚꽃 효과 복제
        for (let i = 0; i < 50; i++) {
            const cherry = document.createElement('div');
            cherry.classList.add('cherry-blossom');
            cherry.style.left = Math.random() * 100 + 'vw';
            cherry.style.animationDuration = Math.random() * 5 + 5 + 's'; // 다양한 낙하 속도
            document.body.appendChild(cherry);
        }

        // 로딩 화면
        const progress = document.querySelector('.progress');
        const phoneScreen = document.querySelector('.phone-screen');
        setTimeout(() => {
            progress.style.width = '100%';
        }, 100);

        setTimeout(() => {
            document.querySelector('.loading-container').style.display = 'none';
            phoneScreen.style.display = 'block';
        }, 5000); // 로딩 완료 후 스마트폰 화면 표시
    </script>
</body>
</html>
