<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Back to the 2012!</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* 기본 스타일 */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(to bottom, #ffb6c1, #ffffff);
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            background-size: cover;
            cursor: none;
        }

        /* 벚꽃 효과 */
        .cherry-blossom {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* 로딩 화면 */
        .loading-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            opacity: 0;
            animation: fadeIn 2s forwards;
            z-index: 2;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .loading-text {
            margin-bottom: 40px;
        }
        .loading-text p {
            margin: 0;
            color: #fff;
        }

        .progress-bar {
            width: 300px;
            height: 15px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin: 0 auto;
        }

        .progress {
            height: 100%;
            width: 0;
            background: #ff69b4;
        }

        /* 스마트폰 화면 */
        .phone-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 700px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            display: none;
            overflow: hidden;
        }

        .header {
            height: 50px;
            background: linear-gradient(to bottom, #ffb6c1, #ffffff);
        }

        .app-icon {
            display: inline-block;
            width: 80px;
            height: 80px;
            margin: 20px 15px;
            background: #ffb6c1;
            border-radius: 15px;
            text-align: center;
            line-height: 80px;
            color: white;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <!-- 벚꽃 효과 -->
    <div class="cherry-blossom"></div>

    <!-- 로딩 화면 -->
    <div class="loading-container">
        <div class="loading-text">
            <p>Back to the 2012,</p>
            <p>Loading...</p>
        </div>
        <div class="progress-bar">
            <div class="progress"></div>
        </div>
    </div>

    <!-- 스마트폰 화면 -->
    <div class="phone-screen">
        <div class="header">
            <img src="/image/header_icon01.png">
            <img src="/image/header_icon02.png">
        </div>
        <div style="padding: 10px; text-align: center;">
            <div class="widget widget01">
                <img src="/image/widget_01.png">
                송년회 궁금하면 클릭!!
            </div>
            <div class="app-icon app_01">
                <img src="/image/app_icon01.png">
                학교 교정
            </div>
            <div class="app-icon app_02">
                <img src="/image/app_icon02">
                ???
            </div>
            <div class="app-icon app_03">
                <img src="/image/app_icon03">
                ???
            </div>
            <div class="widget widget02">
                <img src="/image/widget_02.png">
                그 해 인력거 추억
            </div>
            <div class="app-icon app_04">
                <img src="/image/app_icon04">
                ???
            </div>
            <div class="app-icon app_05">
                <img src="/image/app_icon05">
                ???
            </div>
            <div class="app-icon app_06">
                <img src="/image/app_icon06">
                ???
            </div>
        </div>
    </div>

    <script>
        // 벚꽃 효과
        const defaults = {
            speed: 5,
            maxSize: 15,
            minSize: 10,
            newOn: 400
        };
        const $wrap = $('.cherry-blossom');
        const $petal = $('<span class="petal"></span>');
        let wrapH = $wrap.height();
        let wrapW = $wrap.width();

        const petalGen = () => {
            setTimeout(requestAnimationFrame, defaults.newOn, petalGen);
            const petal = $petal.clone();
            const size = Math.random() * (defaults.maxSize - defaults.minSize) + defaults.minSize;
            const startPosLeft = Math.random() * wrapW;
            const fallTime = Math.random() * 5 + 5;
            petal.css({
                width: size,
                height: size,
                left: startPosLeft,
                position: 'absolute',
                animation: `fall ${fallTime}s linear`
            }).appendTo($wrap);
        };

        $(window).on('load', () => requestAnimationFrame(petalGen));

        // 로딩 화면과 전환
        const progress = document.querySelector('.progress');
        const phoneScreen = document.querySelector('.phone-screen');

        setTimeout(() => {
            progress.style.width = '100%';
        }, 100);

        setTimeout(() => {
            document.querySelector('.loading-container').style.display = 'none';
            phoneScreen.style.display = 'block';
        }, 7000); // 7초 후 스마트폰 화면 전환
    </script>
</body>
</html>
